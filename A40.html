<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test 3</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
    font-family: "VT323", monospace;
      margin: 40px auto;
      background-image: url('torso.PNG');
      color: #000000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    #game {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 2rem;
      max-width: 480px;
      width: 100%;
    }

    h1 {
         font-family: "VT323", monospace;
      font-size: 24px;
      font-weight: 600;
      color: #111;
      margin-bottom: 4px;
    }

    #subtitle {
         font-family: "VT323", monospace;
      font-size: 13px;
      color: #888;
      margin-bottom: 1.5rem;
      font-family: sans-serif;
    }

    #lives-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.25rem;
      font-family: "VT323", monospace;
    }

    #lives-label {  font-family: "VT323", monospace; font-size: 13px; color: #666; }

    .heart {  font-family: "VT323", monospace; font-size: 18px; transition: opacity 0.3s; }
    .heart.lost {  font-family: "VT323", monospace; opacity: 0.15; }

    #word-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    .letter-box {
      width: 44px;
      height: 52px;
      border: 1px solid #ccc;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 600;
      color: #111;
      background: #f9f9f7;
       font-family: "VT323", monospace;
      text-transform: uppercase;
      transition: background 0.2s, color 0.2s;
    }

    .letter-box.hit  { background: #1D9E75; color: #E1F5EE; border-color: #0F6E56; }
    .letter-box.miss { background: #eee; color: #aaa; border-color: #ddd; text-decoration: line-through; }

    #hint-row {
      font-size: 12px;
      color: #aaa;
       font-family: "VT323", monospace;
      margin-bottom: 1rem;
    }

    #input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
    }

    #guess-input {
      flex: 1;
      height: 40px;
      padding: 0 12px;
       font-family: "VT323", monospace;
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
      color: #111;
      outline: none;
    }

    #guess-input:focus { box-shadow: 0 0 0 2px #bbb; }

    button {
      height: 40px;
      padding: 0 18px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: transparent;
      color: #111;
      font-size: 14px;
      cursor: pointer;
       font-family: "VT323", monospace;
      transition: background 0.15s, transform 0.1s;
    }

    button:hover  { background: #f0f0ee; }
    button:active { transform: scale(0.97); }

    #status {
      font-size: 14px;
      color: #888;
       font-family: "VT323", monospace;
      min-height: 20px;
      margin-bottom: 1rem;
    }

    #status.win  { color: #0F6E56; font-weight: 600; }
    #status.lose { color: #993C1D; font-weight: 600; }

    #guesses {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      min-height: 32px;
    }

    .guess-chip {
      padding: 4px 10px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid #ddd;
      background: #f5f5f3;
      color: #888;
       font-family: "VT323", monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .guess-chip.correct { background: #E1F5EE; color: #0F6E56; border-color: #5DCAA5; }
    .guess-chip.wrong   { background: #eee;    color: #bbb;    border-color: transparent; }
  </style>
</head>
<body>
<div id="game">
  <h1>Test 3</h1>
  <p id="subtitle">Guess letters to reveal a word</p>

  <div id="lives-row">
    <span id="lives-label">Lives:</span>
    <span id="hearts"></span>
  </div>

  <div id="word-row"></div>
  <div id="hint-row"></div>

  <div id="input-row">
    <input id="guess-input" maxlength="1" placeholder="A–Z" autocomplete="off" />
    <button onclick="submitGuess()">Guess</button>
    <button onclick="resetGame()">New</button>
    <button id="protectedButton">Continue</button>

<script>
  document.getElementById("protectedButton").addEventListener("click", function() {
   
    var password = prompt("Enter the last two letters.");
    
   
    var correctPassword = "ve"; 

   
    if (password === correctPassword) {
      alert("Continue");
      window.location.href = "https://rileysamples.github.io/exit.html"; 
    } else {
      alert("Access denied.");
    }
  });
</script>
  </div>

  <div id="status"></div>
  <div id="guesses"></div>
</div>

<script>
  const SECRET_WORD = "Radio";
  const HINT = "This is what WPRB is known for";
  
  const MAX_WRONG = 6;
  let word, guessed, wrongCount, gameOver;

  function resetGame() {
    word = SECRET_WORD.toUpperCase().split('');
    guessed = new Set();
    wrongCount = 0;
    gameOver = false;
    document.getElementById('guess-input').value = '';
    document.getElementById('status').className = '';
    document.getElementById('status').textContent = '';
    render();
  }

  function render() {
    const wordRow = document.getElementById('word-row');
    wordRow.innerHTML = '';
    word.forEach(ch => {
      const box = document.createElement('div');
      box.className = 'letter-box' + (guessed.has(ch) ? ' hit' : '');
      box.textContent = guessed.has(ch) ? ch : '';
      wordRow.appendChild(box);
    });

    const heartsEl = document.getElementById('hearts');
    heartsEl.innerHTML = '';
    for (let i = 0; i < MAX_WRONG; i++) {
      const h = document.createElement('span');
      h.className = 'heart' + (i < wrongCount ? ' lost' : '');
      h.textContent = i < wrongCount ? '♡' : '♥';
      heartsEl.appendChild(h);
    }

    document.getElementById('hint-row').textContent = HINT ? 'Hint: ' + HINT : '';

    const guessesEl = document.getElementById('guesses');
    guessesEl.innerHTML = '';
    [...guessed].forEach(ch => {
      const chip = document.createElement('div');
      chip.className = 'guess-chip ' + (word.includes(ch) ? 'correct' : 'wrong');
      chip.textContent = ch;
      guessesEl.appendChild(chip);
    });

    if (!gameOver) {
      if (word.every(ch => guessed.has(ch))) {
        gameOver = true;
        const s = document.getElementById('status');
        s.className = 'win';
        s.textContent = 'You got it! The word was ' + word.join('') + '. The final letters are ve.'; //here
      } else if (wrongCount >= MAX_WRONG) {
        gameOver = true;
        word.forEach(ch => guessed.add(ch));
        const s = document.getElementById('status');
        s.className = 'lose';
        s.textContent = 'Game over. The word was ' + word.join('') + '.';
        document.getElementById('word-row').querySelectorAll('.letter-box').forEach((box, i) => {
          box.textContent = word[i];
          box.classList.add('miss');
        });
      }
    }
  }

  function submitGuess() {
    if (gameOver) return;
    const input = document.getElementById('guess-input');
    const ch = input.value.toUpperCase().trim();
    input.value = '';
    input.focus();
    if (!ch || !/^[A-Z]$/.test(ch)) {
      document.getElementById('status').textContent = 'Enter a single letter A–Z.';
      return;
    }
    if (guessed.has(ch)) {
      document.getElementById('status').textContent = 'Already guessed ' + ch + '.';
      return;
    }
    document.getElementById('status').textContent = '';
    guessed.add(ch);
    if (!word.includes(ch)) wrongCount++;
    render();
  }

  document.getElementById('guess-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitGuess();
  });

  resetGame();
</script>
</body>
</html>
