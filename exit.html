
<!DOCTYPE html>
<html lang="en">
  
<head>
    <title>Exit</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-image: url('head.png');
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
}
        }

        #dialogueBox {
            width: 300px;
            margin: 20px auto;
            padding: 15px;
            border: 2px solid black;
            background: white;
            min-height: 60px;
            font-size: 18px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Dialogue Box -->
    <div id="dialogueBox">
        Hello there!
    </div>

    <!-- Next Button -->
    <br>
    <button onclick="nextDialogue()">Next</button>

<script>
  document.getElementById("protectedButton").addEventListener("click", function() {
   
    var password = prompt("Enter the full passcode.");
    
   
    var correctPassword = "leave"; 

   
    if (password === correctPassword) {
      alert("Continue");
      window.location.href = "https://rileysamples.github.io/final.html"; 
    } else {
      alert("Access denied.");
    }
    <script>
        const dialogues = [
        
            "Thank you for saving me.",

        ];

        let currentDialogue = 0;

        function nextDialogue() {
            currentDialogue++;

            if (currentDialogue >= dialogues.length) {
                currentDialogue = 0;
            }

            document.getElementById("dialogueBox").innerText =
                dialogues[currentDialogue];
        }
    </script>

</body>

  });
</script>
</html>
