

  
  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <title>Trivia Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f5f4f0;
      min-height: 100vh;
      display: flex;
       background-image: url('knees.png');
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    #card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 2rem;
      max-width: 520px;
      width: 100%;
    }

    #progress {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 0.5rem;
    }

    #question {
      font-size: 18px;
      font-weight: 600;
      color: #111;
      margin-bottom: 1.25rem;
      line-height: 1.5;
    }

    .option {
      display: block;
      width: 100%;
      text-align: left;
      padding: 12px 16px;
      margin-bottom: 8px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
      color: #111;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .option:hover:not(:disabled) { background: #f5f5f3; }
    .option:active:not(:disabled) { transform: scale(0.99); }
    .option.correct { background: #E1F5EE; border-color: #5DCAA5; color: #085041; }
    .option.wrong   { background: #FCEBEB; border-color: #F09595; color: #501313; }
    .option.reveal  { background: #E1F5EE; border-color: #5DCAA5; color: #085041; }

    #feedback {
      font-size: 13px;
      color: #666;
      min-height: 20px;
      margin: 0.75rem 0;
    }

    #next-btn {
      margin-top: 0.5rem;
      padding: 10px 22px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: transparent;
      color: #111;
      font-size: 14px;
      cursor: pointer;
      display: none;
      transition: background 0.15s, transform 0.1s;
    }

    #next-btn:hover  { background: #f5f5f3; }
    #next-btn:active { transform: scale(0.97); }

    #score-card {
      display: none;
      text-align: center;
      padding: 2rem 0;
    }

    #score-num {
      font-size: 52px;
      font-weight: 600;
      color: #111;
    }

    #score-label {
      font-size: 14px;
      color: #888;
      margin-bottom: 1.5rem;
    }

    #restart-btn {
      padding: 10px 24px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: transparent;
      color: #111;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #restart-btn:hover { background: #f5f5f3; }
  </style>
</head>
<body>
<div id="card">
  <div id="game-area">
    <div id="progress"></div>
    <div id="question"></div>
    <div id="options"></div>
    <div id="feedback"></div>
    <button id="next-btn">Next</button>
  </div>
  <div id="score-card">
    <div id="score-num"></div>
    <div id="score-label"></div>
    <button id="restart-btn" onclick="startGame()">Play again</button>
  </div>
</div>

<script>
  // ── EDIT YOUR QUESTIONS HERE ──────────────────────────────────────────
  const questions = [
    {
      q: "What is the capital city of Australia?",
      options: ["Sydney", "Melbourne", "Canberra", "Brisbane"],
      answer: 2
    },
    {
      q: "How many bones are in the adult human body?",
      options: ["196", "206", "216", "226"],
      answer: 1
    },
    {
      q: "Which planet in our solar system has the most moons?",
      options: ["Jupiter", "Saturn", "Uranus", "Neptune"],
      answer: 1
    },
    {
      q: "What year did the Berlin Wall fall?",
      options: ["1987", "1988", "1989", "1990"],
      answer: 2
    }
  ];
  // answer: is the index (0–3) of the correct option
  // ─────────────────────────────────────────────────────────────────────

  let current = 0, score = 0, answered = false;

  function startGame() {
    current = 0; score = 0; answered = false;
    document.getElementById('score-card').style.display = 'none';
    document.getElementById('game-area').style.display = 'block';
    showQuestion();
  }

  function showQuestion() {
    answered = false;
    const q = questions[current];
    document.getElementById('progress').textContent = 'Question ' + (current + 1) + ' of ' + questions.length;
    document.getElementById('question').textContent = q.q;
    document.getElementById('feedback').textContent = '';
    document.getElementById('next-btn').style.display = 'none';

    const optDiv = document.getElementById('options');
    optDiv.innerHTML = '';
    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option';
      btn.textContent = opt;
      btn.onclick = () => pick(i, btn);
      optDiv.appendChild(btn);
    });
  }

  function pick(i, btn) {
    if (answered) return;
    answered = true;
    const q = questions[current];
    const allBtns = document.querySelectorAll('.option');
    allBtns.forEach(b => b.disabled = true);

    if (i === q.answer) {
      btn.classList.add('correct');
      document.getElementById('feedback').textContent = 'Correct!';
      score++;
    } else {
      btn.classList.add('wrong');
      allBtns[q.answer].classList.add('reveal');
      document.getElementById('feedback').textContent = 'Not quite. The answer was: ' + q.options[q.answer];
    }

    const nextBtn = document.getElementById('next-btn');
    nextBtn.style.display = 'inline-block';
    nextBtn.textContent = current < questions.length - 1 ? 'Next' : 'See results';
  }

  document.getElementById('next-btn').onclick = () => {
    current++;
    if (current < questions.length) {
      showQuestion();
    } else {
      document.getElementById('game-area').style.display = 'none';
      document.getElementById('score-card').style.display = 'block';
      document.getElementById('score-num').textContent = score + ' / ' + questions.length;
      const msgs = ['Better luck next time!', 'Not bad!', 'Good effort!', 'Almost perfect!', 'Perfect score!'];
      document.getElementById('score-label').textContent = msgs[score] || '';
    }
  };

  startGame();
</script>
</body>
</html>
