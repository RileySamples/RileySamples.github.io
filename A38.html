<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test 2</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <title>Your first test</title>
  <style>
    body {
      font-family: "VT323", monospace;
      max-width: 480px;
      margin: 40px auto;
      padding: 0 20px;
      background-image: url('knees.png');
      color: #000000;
    }
  
  
    h1 {
      font-size: 22px;
      font-weight: 500;
      margin: 0 0 1rem;
    }

    #question {
      font-size: 16px;
      line-height: 1.6;
      margin: 0 0 1rem;
      min-height: 50px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 1rem;
    }

    .option {
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 0px;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .option:hover {
      background: #eee;
    }

    .option.correct {
      background: #eaf3de;
      color: #3b6d11;
      cursor: default;
    }

    .option.wrong {
      background: #fcebeb;
      color: #a32d2d;
      cursor: default;
    }

    .msg {
      font-size: 14px;
      color: #555;
      min-height: 20px;
      margin: 0 0 0.5rem;
    }

    .score {
      font-size: 13px;
      color: #999;
    }
  </style>
</head>
<body>

  <h1>Quick trivia</h1>
  <p id="question"></p>
  <div class="grid" id="options"></div>
  <p class="msg" id="msg"></p>
  <p class="score" id="score">Score: 0 / 0</p>

  <script>
    const questions = [
      { q: 'What numbers represent wprb?', opts: ['103.3', '104.3', '102.3', '103.2'], a: 0 },
      { q: 'Where is WPRB located?', opts: ['New south', 'bloomberg', 'nassau', 'east pyne'], a: 1 },
      { q: 'x?', opts: ['x', 'x', 'x', 'x'], a: 2 },
     { q: 'x?', opts: ['x', 'x', 'x', 'x'], a: 2 },
      { q: 'x?', opts: ['x', 'x', 'x', 'x'], a: 2 },
      { q: 'x?', opts: ['x', 'x', 'x', 'x'], a: 2 },
      { q: 'x?', opts: ['x', 'x', 'x', 'x'], a: 2 },
      { q: 'x?', opts: ['x', 'x', 'x', 'x'], a: 2 },
    ];

    let order, idx, correct, total;

    function init() {
      order = questions.map((_, i) => i).sort(() => Math.random() - 0.5);
      idx = 0;
      correct = 0;
      total = 0;
      document.getElementById('msg').textContent = '';
      document.getElementById('score').textContent = 'Score: 0 / 0';
      showQuestion();
    }

    function showQuestion() {
      if (idx >= order.length) {
        idx = 0;
        order.sort(() => Math.random() - 0.5);
      }
      const q = questions[order[idx]];
      document.getElementById('question').textContent = q.q;
      document.getElementById('msg').textContent = '';

      const grid = document.getElementById('options');
      grid.innerHTML = '';
      q.opts.forEach((opt, i) => {
        const el = document.createElement('div');
        el.className = 'option';
        el.textContent = opt;
        el.onclick = () => answer(i, q.a, el, grid);
        grid.appendChild(el);
      });
    }

    function answer(chosen, correct_idx, el, grid) {
      total++;
      const cells = grid.querySelectorAll('.option');
      cells.forEach(c => c.onclick = null);

      if (chosen === correct_idx) {
        correct++;
        el.classList.add('correct');
        document.getElementById('msg').textContent = 'Correct!';
      } else {
        el.classList.add('wrong');
        cells[correct_idx].classList.add('correct');
        document.getElementById('msg').textContent = 'Wrong — the answer was: ' + questions[order[idx]].opts[correct_idx];
      }

      document.getElementById('score').textContent = 'Score: ' + correct + ' / ' + total +'The second and third letters are "ea".';
      idx++;
      setTimeout(showQuestion, 1400);
    }
      <button id="protectedButton">Continue</button>

<script>
  document.getElementById("protectedButton").addEventListener("click", function() {
   
    var password = prompt("Enter the second and third letters.");
    
   
    var correctPassword = "ea"; 

   
    if (password === correctPassword) {
      alert("Continue");
      window.location.href = "https://rileysamples.github.io/t3.html"; 
    } else {
      alert("Access denied.");
    }
  });
</script>

    init();
  </script>

</body>
</html>
